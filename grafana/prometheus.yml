global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:

  # ─── Сам Prometheus ───────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ─── Oracle VPS — системные метрики (CPU, RAM, disk, network) ────────────
  # node_exporter запущен в контейнере с network_mode: host → порт 9100 на хосте
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['10.0.0.237:9100']
    relabel_configs:
      - target_label: instance
        replacement: 'oracle-vps'

  # ─── Docker containers метрики (cAdvisor)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['10.0.0.237:8080']
    relabel_configs:
      - target_label: instance
        replacement: 'oracle-vps-docker'
