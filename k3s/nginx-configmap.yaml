apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-configs
data:
  nginx-common.conf: |
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
    resolver kube-dns.kube-system.svc.cluster.local valid=30s;
  feedback-app.pp.ua.conf: |
    server {
        listen 80;
        server_name feedback-app.pp.ua;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name feedback-app.pp.ua;
        ssl_certificate /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        location /.well-known/assetlinks.json {
            root /usr/share/nginx/html;
            default_type application/json;
        }
        location ~* ^/(privacy-policy|privacy%20policy|privacy|policy) {
            root /usr/share/nginx/html;
            try_files /privacy.html = 404;
            default_type text/html;
        }
        location /portainer/ {
            auth_basic "Restricted Access";
            auth_basic_user_file /etc/nginx/auth/.htpasswd;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            set $portainer_upstream http://portainer-service:9000/;
            proxy_pass $portainer_upstream;
            proxy_read_timeout 3600s;
        }
        location / {
            set $site_upstream https://site-service:9443;
            proxy_pass $site_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_ssl_verify off;
            proxy_ssl_server_name on;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
  api.feedback-app.pp.ua.conf: |
    server {
        listen 80;
        server_name api.feedback-app.pp.ua;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name api.feedback-app.pp.ua;
        ssl_certificate /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        location / {
            add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
            set $backend_upstream https://backend-service:20443;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
  app.feedback-app.pp.ua.conf: |
    server {
        listen 80;
        server_name app.feedback-app.pp.ua;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name app.feedback-app.pp.ua;
        ssl_certificate /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        location /.well-known/assetlinks.json {
            root /usr/share/nginx/html;
            default_type application/json;
        }
        location / {
            add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
            set $app_upstream http://app-service:5173;
            proxy_pass $app_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
  wildcard.feedback-app.pp.ua.conf: |
    server {
        listen 80;
        server_name *.feedback-app.pp.ua;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name *.feedback-app.pp.ua;
        ssl_certificate /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        location / {
            set $frontend_upstream https://frontend-service:10443;
            proxy_pass $frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
  odoo.feedback-app.pp.ua.conf: |
    server {
        listen 80;
        server_name odoo.feedback-app.pp.ua;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name odoo.feedback-app.pp.ua;
        ssl_certificate /etc/nginx/certs/tls.crt;
        ssl_certificate_key /etc/nginx/certs/tls.key;
        location / {
            set $odoo_upstream http://odoo-service:8069;
            proxy_pass $odoo_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html
data:
  privacy.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Privacy Policy - FeedBack App</title>
        <style>
            body { font-family: sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
            h1 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
            h2 { color: #34495e; margin-top: 30px; }
            .footer { margin-top: 50px; font-size: 0.8em; color: #7f8c8d; border-top: 1px solid #eee; padding-top: 20px; }
        </style>
    </head>
    <body>
        <h1>Privacy Policy</h1>
        <p>Last updated: March 29, 2026</p>

        <p>This Privacy Policy describes our policies and procedures on the collection, use, and disclosure of Your information when You use the <strong>FeedBack</strong> mobile application.</p>

        <h2>1. Information Collection and Use</h2>
        <p>We built the FeedBack app as a Free/Commercial tool for restaurant management. <strong>We do not collect, store, or process any personal data</strong> from our users (owners, administrators, or waiters).</p>
        <ul>
            <li><strong>Personal Data:</strong> We do not ask for or store your name, email, or phone number.</li>
            <li><strong>Usage Data:</strong> We do not track your location or device activity.</li>
            <li><strong>Database:</strong> All operational data remains within your local environment or is processed in real-time without permanent storage on our servers.</li>
        </ul>

        <h2>2. Third-Party Services</h2>
        <p>The app may use standard services (like Google Play Services or Apple App Store Services) that may collect information used to identify you for platform-level analytics. However, our application itself does not transmit any of your business data to third parties.</p>

        <h2>3. Children’s Privacy</h2>
        <p>These Services do not address anyone under the age of 13. We do not knowingly collect personally identifiable information from children under 13.</p>

        <h2>4. Security</h2>
        <p>Since we do not collect or store your information, there is no risk of your data being leaked from our servers. We value your trust in using our app for your business.</p>

        <h2>5. Changes to This Privacy Policy</h2>
        <p>We may update our Privacy Policy from time to time. You are advised to review this page periodically for any changes.</p>

        <h2>6. Contact Us</h2>
        <p>If you have any questions or suggestions about our Privacy Policy, do not hesitate to contact us at:</p>
        <p><strong>Email:</strong> support@feedback-app.pp.ua</p>

        <div class="footer">
            &copy; 2026 FeedBack App. All rights reserved.
        </div>
    </body>
    </html>
  assetlinks.json: |
    [
        {
            "relation": [
                "delegate_permission/common.handle_all_urls",
                "delegate_permission/common.get_login_creds"
            ],
            "target": {
                "namespace": "android_app",
                "package_name": "app.feedback",
                "sha256_cert_fingerprints": [
                    "54:8E:16:A6:8F:0A:14:93:CA:4A:AF:6E:EC:B7:19:A2:07:66:E7:B1:11:B5:FC:78:ED:E1:01:D5:DB:CC:00:99"
                ]
            }
        }
    ]