server {
    listen 80;
    server_name *.feedback-app.pp.ua;

    access_log /var/log/nginx/access.frontend.80.log debug_format;
    error_log /var/log/nginx/error.frontend.80.log notice;

    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name *.feedback-app.pp.ua;

    access_log /var/log/nginx/access.frontend.443.log debug_format;
    error_log /var/log/nginx/error.frontend.443.log notice;

    ssl_certificate /etc/nginx/certs-feedback-app/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs-feedback-app/key.pem;

    location / {
        proxy_pass https://10.0.0.237:10443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}