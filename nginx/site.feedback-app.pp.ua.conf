# Определение переменной для корректной работы WebSockets
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Редирект с HTTP на HTTPS для основного домена и всех поддоменов
server {
    listen 80;
    server_name feedback-app.pp.ua;

    access_log /var/log/nginx/access.site.80.log debug_format;
    error_log /var/log/nginx/error.site.80.log notice;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name feedback-app.pp.ua;

    access_log /var/log/nginx/access.site.443.log debug_format buffer=32k flush=1s;
    access_log /var/log/nginx/access.site.443.fail2ban.log fail2ban buffer=32k flush=1s;
    error_log /var/log/nginx/error.site.443.log notice;

    rewrite_log on;

    # Указываем пути внутри контейнера
    ssl_certificate /etc/nginx/certs-feedback-app/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs-feedback-app/key.pem;
    
    # Рекомендуется добавить цепочку CA, если браузер будет ругаться
    ssl_trusted_certificate /etc/nginx/certs-feedback-app/certCA.pem;

    # Google Digital Asset Links (Android App Links & Credential Sharing)
    location /.well-known/assetlinks.json {
        root /usr/share/nginx/html;
        default_type application/json;
    }

    # Отдаем страницу Privacy Policy
    # Если адрес должен быть буквально https://feedback-app.pp.ua/Privacy%20Policy
    location ~* ^/(privacy-policy|privacy%20policy|privacy|policy) {
        root /usr/share/nginx/html;
        try_files /privacy.html = 404;
        default_type text/html;
    }

    # Portainer с Basic Auth
    location /portainer/ {
        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/portainer/.htpasswd;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Обязательно добавляем слеш в конце. 
        # Это заставит Nginx заменить "/portainer/" на "/" при передаче запроса в Portainer.
        proxy_pass http://10.0.0.237:9000/;

        proxy_read_timeout 3600s;
    }

    # Grafana
    location /grafana/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://10.0.0.237:3001;
        proxy_read_timeout 3600s;
    }


    # Всё остальное проксируем на основной сайт
    location / {
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

        proxy_pass https://10.0.0.237:9443;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Параметры для стабильности WebSocket
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Всё остальное — в 404
    # location / {
    #     return 404;
    # }
}