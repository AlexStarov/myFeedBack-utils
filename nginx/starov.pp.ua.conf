# Unified Nginx configuration for starov domain family

# HTTP -> HTTPS redirect for all hostnames
server {
    listen 80;
    server_name starov.pp.ua alex.starov.pp.ua alex_starov.feedback-app.pp.ua www.starov.pp.ua;

    # Permanent redirect to canonical HTTPS domain
    return 301 https://starov.pp.ua$request_uri;
}

# HTTPS server serving the application and all required locations
server {
    listen 443 ssl;
    server_name starov.pp.ua alex.starov.pp.ua alex_starov.feedback-app.pp.ua www.starov.pp.ua;

    ssl_certificate /etc/nginx/certs-starov/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs-starov/key.pem;

    # ---------- Sitemap ----------
    location = /sitemap.xml {
        alias /usr/share/nginx/html/sitemap_starov.xml;
    }

    # ---------- robots.txt ----------
    location = /robots.txt {
        proxy_pass http://10.0.0.237:3000/robots.txt;
        proxy_set_header Host $host;
    }

    # ---------- API proxies ----------
    location /api/go/ {
        proxy_pass http://10.0.0.237:8081/api/go/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/py/ {
        proxy_pass http://10.0.0.237:8082/api/py/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Portainer ----------
    location /portainer/ {
        auth_basic "Restricted Access";
        auth_basic_user_file /etc/nginx/portainer/.htpasswd;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://10.0.0.237:9000/;
        proxy_read_timeout 3600s;
    }

    # ---------- Grafana ----------
    location /grafana/ {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://10.0.0.237:3001;
        proxy_read_timeout 3600s;
    }

    # ---------- Frontend (root) ----------
    location / {
        proxy_pass http://10.0.0.237:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
